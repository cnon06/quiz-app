<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <div id="button-box" class="active">
        <button class="btn btn-lg btn-warning btn-start">Start Quiz</button>
      </div>
      <div id="quiz-box" class="card">
        <div id="header" class="card-header">
          <h4 class="app-title mb-0">Quiz App</h4>

          <div class="time">
            <div class="time-text">Estimated Time:</div>
            <div class="time-second">10</div>
          </div>
          <div class="time-line"></div>
        </div>
        <div id="body"></div>
        <div id="footer" class="card-footer summary">
          <div class="question-index badge text-bg-danger"></div>
          <button class="btn-next btn btn-secondary btn-sm" id="btn-next">
            <i class="bi bi-arrow-right"></i>
          </button>
        </div>
      </div>
      <div id="score-box" class="card card-body">
        <i class="bi bi-trophy trophy-icon text-primary"></i>
        <p class="score-text"></p>
        <div>
          <button class="btn btn-primary btn-replay">Replay</button>
          <button class="btn btn-primary btn-quit">Quit</button>
        </div>
      </div>
    </div>

    <!-- <button id="btnGetQuestion">Get Question</button> -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
